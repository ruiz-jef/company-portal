<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Portal Login - Ruiz & Associates</title>
    <link rel="stylesheet" href="shared/portal.css">
    
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="shared/auth.js"></script>
    
    <style>
        /* Custom styles for the auth tabs inside the card */
        .auth-tabs {
            display: flex;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 1.5rem;
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 0.75rem;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-secondary);
            transition: var(--transition-smooth);
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }
        .auth-tab.active {
            color: var(--accent-blue);
            border-color: var(--accent-blue);
        }
        .auth-tab:hover {
            color: var(--slate-dark);
        }
        .form-container {
            display: none;
        }
        .form-container.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>
    <div class="portal-bg"></div>
    
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <img src="shared/APPLE Logo.jpg" alt="Logo" style="height: 60px; border-radius: 6px; object-fit: contain; background: white; padding: 4px; margin-bottom: 0.75rem; box-shadow: var(--shadow-sm);">
                <h1 class="auth-title">Ruiz & Associates</h1>
                <p class="auth-subtitle">Internal Company Portal</p>

            </div>
            
            <div class="auth-tabs">
                <div id="tab-login" class="auth-tab active" onclick="switchTab('login')">Sign In</div>
                <div id="tab-register" class="auth-tab" onclick="switchTab('register')">Register</div>
            </div>
            
            <div id="alert-error" class="alert alert-danger" style="display: none;"></div>
            <div id="alert-success" class="alert alert-success" style="display: none;"></div>
            
            <!-- Login Form -->
            <div id="login-container" class="form-container active">
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label class="form-label" for="login-email">Email Address</label>
                        <input type="email" id="login-email" class="input-field" placeholder="username@ruizinc.net" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="login-password">Password</label>
                        <input type="password" id="login-password" class="input-field" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn-primary">
                        Sign In
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                    </button>
                </form>
            </div>
            
            <!-- Register Form -->
            <div id="register-container" class="form-container">
                <form id="registerForm" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label class="form-label" for="register-email">Email Address</label>
                        <input type="email" id="register-email" class="input-field" placeholder="username@ruizinc.net" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="register-password">Password</label>
                        <input type="password" id="register-password" class="input-field" placeholder="•••••••• (Min. 6 chars)" required autocomplete="new-password">
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="register-confirm">Confirm Password</label>
                        <input type="password" id="register-confirm" class="input-field" placeholder="••••••••" required autocomplete="new-password">
                    </div>
                    <button type="submit" class="btn-primary">
                        Create Account
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><line x1="20" y1="8" x2="20" y2="14"></line><line x1="23" y1="11" x2="17" y2="11"></line></svg>
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <footer class="portal-footer" style="background: transparent; border: none; margin-top: 0;">
        &copy; 2026 Ruiz & Associates Safety Department. All rights reserved.
    </footer>
    
    <script>
        // Start Auth Guard for root index.html
        initAuthGuard(0);
        
        const errorAlert = document.getElementById('alert-error');
        const successAlert = document.getElementById('alert-success');
        
        function showAlert(type, message) {
            errorAlert.style.display = 'none';
            successAlert.style.display = 'none';
            
            if (type === 'error') {
                errorAlert.textContent = message;
                errorAlert.style.display = 'block';
            } else if (type === 'success') {
                successAlert.textContent = message;
                successAlert.style.display = 'block';
            }
        }
        
        function switchTab(tab) {
            document.getElementById('tab-login').classList.toggle('active', tab === 'login');
            document.getElementById('tab-register').classList.toggle('active', tab === 'register');
            
            document.getElementById('login-container').classList.toggle('active', tab === 'login');
            document.getElementById('register-container').classList.toggle('active', tab === 'register');
            
            // Clear alerts
            errorAlert.style.display = 'none';
            successAlert.style.display = 'none';
        }
        
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            
            try {
                showAlert('success', 'Authenticating...');
                await loginUser(email, password);
                // Auth Guard listener will redirect us to dashboard.html automatically
            } catch (err) {
                console.error("Login failed:", err);
                showAlert('error', err.message || "Failed to login. Please check your credentials.");
            }
        }
        
        async function handleRegister(e) {
            e.preventDefault();
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;
            const confirm = document.getElementById('register-confirm').value;
            
            if (password !== confirm) {
                showAlert('error', 'Passwords do not match.');
                return;
            }
            if (password.length < 6) {
                showAlert('error', 'Password must be at least 6 characters.');
                return;
            }
            
            try {
                showAlert('success', 'Creating account...');
                await registerUser(email, password);
                showAlert('success', 'Account created! A verification link has been sent to ' + email + '. Please verify your email, then sign in below.');
                switchTab('login');
                document.getElementById('registerForm').reset();
            } catch (err) {
                console.error("Registration failed:", err);
                showAlert('error', err.message || "Failed to register account.");
            }
        }
    </script>
</body>
</html>
